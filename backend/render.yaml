services:
  - type: web
    name: airplane-eticketing-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: airplane-eticketing-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URL
        value: mongodb://localhost:27017
      - key: MONGODB_DB_NAME
        value: eticketing_logs
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: noreply@eticket.com
      - key: SMTP_FROM_NAME
        value: E-Ticketing System

databases:
  - name: airplane-eticketing-db
    databaseName: eticketing
    user: eticketing_user
    plan: free
    region: singapore
